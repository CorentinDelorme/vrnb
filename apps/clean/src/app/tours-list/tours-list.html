<div class="mb-4 sm:mb-8">
  <details class="collapse collapse-arrow bg-base-100 border border-base-300 shadow-sm">
    <summary class="collapse-title text-sm font-semibold sm:text-base flex items-center gap-4">
      <img class="h-auto w-28" src="/icons/ouest-france.svg" alt="Logo Ouest-France" />

      Articles Ouest-France
    </summary>

    <div class="collapse-content">
      <ul class="list-disc space-y-2 pl-5 text-sm sm:text-base border-t border-base-200 pt-4">
        @for (article of articles; track article.url) {
          <li>
            <a
              class="link link-secondary font-medium"
              [href]="article.url"
              target="_blank"
              rel="noopener noreferrer"
            >
              {{ article.title }}
            </a>
          </li>
        }
      </ul>
    </div>
  </details>
</div>

@if (tourStorage.savedTour()) {
  <ul class="list bg-base-100 rounded-box mb-4 shadow-md sm:mb-8">
    <li class="list-row items-center">
      <div class="text-base font-light text-black opacity-60 sm:text-xl">
        Reprendre le parcours {{ tourStorage.savedTour()?.tourId }} (étape
        {{ (tourStorage.savedTour()?.step || 0) + 1 }}/3)
      </div>
      <div class="list-col-grow flex justify-end">
        <button
          class="btn btn-square btn-ghost"
          [routerLink]="['/tour', tourStorage.savedTour()?.tourId]"
          aria-label="Lancer le parcours"
        >
          <hugeicons-icon
            class="text-primary-content"
            [icon]="playIcon"
            [strokeWidth]="1.5"
            alt="Lancer le parcours"
          />
        </button>
      </div>
    </li>
  </ul>
}

<div class="grid grid-cols-1 gap-4 sm:gap-8 lg:grid-cols-2">
  <app-tour-list-section [title]="'Parcours à vélo'" [tours]="tourService.vTours" [type]="'V'" />
  <app-tour-list-section [title]="'Parcours à pied'" [tours]="tourService.pTours" [type]="'P'" />
</div>

<footer class="pt-4 text-center text-sm opacity-70 sm:pt-8">©{{ currentYear }} VRNB</footer>
