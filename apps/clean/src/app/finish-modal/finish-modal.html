<dialog class="modal" id="finish_modal">
  <div class="modal-box">
    <form method="dialog">
      <button class="btn btn-sm btn-ghost btn-circle absolute top-2 right-2" aria-label="Fermer">
        <hugeicons-icon [icon]="cancelIcon" [strokeWidth]="1.5" alt="Fermer" />
      </button>
    </form>

    <h3 class="text-lg font-bold">Félicitations !</h3>
    <p class="py-4">Vous avez terminé le parcours.</p>
  </div>
</dialog>
