<div class="flex flex-col items-center gap-4 sm:gap-8">
  <ul class="steps">
    <li class="step" [class.step-secondary]="step() >= 0" [class.text-secondary]="step() === 0">
      Début
    </li>
    <li class="step" [class.step-secondary]="step() >= 1" [class.text-secondary]="step() === 1">
      Nettoyage
    </li>
    <li class="step" [class.step-secondary]="step() >= 2" [class.text-secondary]="step() === 2">
      Fin
    </li>
  </ul>

  <div class="flex w-full justify-center">
    <div
      class="z-0 h-[calc(100dvh-208px)] w-full overflow-hidden sm:h-[calc(100vh-296px)]"
      id="map"
    ></div>
  </div>

  <div class="dock max-sm:dock-xs">
    <button class="btn btn-ghost max-sm:btn-sm" [disabled]="step() === 0" (click)="prevStep()">
      Précédent
    </button>
    @if (step() === 2) {
      <button class="btn btn-primary max-sm:btn-sm" (click)="finish()">Terminer</button>
    } @else {
      <button class="btn btn-primary max-sm:btn-sm" (click)="nextStep()">Suivant</button>
    }
  </div>

  <app-finish-modal></app-finish-modal>
</div>
